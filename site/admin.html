<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strype Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0d1117; --card: #161b22; --border: #30363d;
            --text: #e6edf3; --text2: #8b949e; --green: #3fb950;
            --blue: #58a6ff; --red: #f85149; --yellow: #d29922;
            --radius: 8px;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        a { color: var(--blue); text-decoration: none; }
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 24px; border-bottom: 1px solid var(--border); background: var(--card);
        }
        .topbar h1 { font-size: 18px; font-weight: 700; }
        .topbar .links { display: flex; gap: 16px; align-items: center; font-size: 14px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .tabs { display: flex; gap: 4px; margin-bottom: 24px; }
        .tab {
            padding: 8px 20px; border-radius: var(--radius); cursor: pointer;
            font-size: 14px; font-weight: 500; background: transparent; color: var(--text2);
            border: 1px solid transparent; transition: all 0.15s;
        }
        .tab.active { background: var(--card); color: var(--text); border-color: var(--border); }
        .tab:hover:not(.active) { color: var(--text); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
        .stat-card {
            background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 20px; text-align: center;
        }
        .stat-card .value { font-size: 36px; font-weight: 700; color: var(--green); }
        .stat-card .label { font-size: 13px; color: var(--text2); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; padding: 10px 12px; color: var(--text2); font-weight: 500; border-bottom: 1px solid var(--border); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 12px;
            font-size: 12px; font-weight: 500;
        }
        .badge-free { background: rgba(139,148,158,0.2); color: var(--text2); }
        .badge-pro { background: rgba(63,185,80,0.2); color: var(--green); }
        .badge-admin { background: rgba(210,153,34,0.2); color: var(--yellow); }
        .badge-robot { background: rgba(88,166,255,0.2); color: var(--blue); }
        .badge-enterprise { background: rgba(240,136,62,0.2); color: #f0883e; }
        .btn {
            padding: 6px 14px; border-radius: 6px; cursor: pointer;
            font-size: 13px; font-weight: 500; border: 1px solid var(--border);
            background: var(--card); color: var(--text); transition: all 0.15s;
        }
        .btn:hover { border-color: var(--text2); }
        .btn-sm { padding: 4px 10px; font-size: 12px; }
        .btn-danger { border-color: var(--red); color: var(--red); }
        .btn-danger:hover { background: var(--red); color: white; }
        .panel { display: none; }
        .panel.active { display: block; }
        .actions { display: flex; gap: 6px; }
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 16px; }
        .empty { text-align: center; padding: 48px; color: var(--text2); }
        .auth-gate { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; }
        .auth-gate h2 { margin-bottom: 8px; }
        .auth-gate p { color: var(--text2); }
        select { background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; font-size: 12px; }

        /* ═══ MOBILE RESPONSIVE ═══ */
        @media (max-width: 768px) {
            .topbar { padding: 8px 12px; }
            .topbar h1 { font-size: 15px; }
            .container { padding: 12px; }
            .tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; flex-wrap: nowrap; gap: 2px; padding-bottom: 4px; }
            .tab { white-space: nowrap; padding: 6px 14px; font-size: 13px; flex-shrink: 0; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .stat-card { padding: 14px; }
            .stat-card .value { font-size: 28px; }
            table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
            th, td { white-space: nowrap; padding: 8px 10px; font-size: 13px; }
            .actions { flex-wrap: wrap; }
        }

        @media (max-width: 480px) {
            .topbar .links { gap: 8px; font-size: 12px; }
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 6px; }
            .stat-card .value { font-size: 24px; }
            .stat-card .label { font-size: 11px; }

            /* Card layout: hide table headers, use data-label attributes */
            table.responsive-table { display: block; }
            table.responsive-table thead { display: none; }
            table.responsive-table tbody { display: block; }
            table.responsive-table tr {
                display: block; margin-bottom: 8px; padding: 12px;
                background: var(--card); border: 1px solid var(--border);
                border-radius: var(--radius);
            }
            table.responsive-table td {
                display: flex; justify-content: space-between; align-items: center;
                padding: 4px 0; border-bottom: none; white-space: normal;
            }
            table.responsive-table td::before {
                content: attr(data-label);
                font-size: 11px; font-weight: 500; color: var(--text2);
                text-transform: uppercase; letter-spacing: 0.5px;
                margin-right: 12px; flex-shrink: 0;
            }
            table.responsive-table td:last-child { padding-bottom: 0; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <h1>Strype Admin</h1>
        <div class="links">
            <a href="/platform.html">Platform</a>
            <span id="userEmail" style="color: var(--text2); font-size: 13px;"></span>
        </div>
    </div>

    <div id="authGate" class="auth-gate" style="display:none;">
        <h2>Access Denied</h2>
        <p>You must be an admin to access this page.</p>
        <a href="/platform.html" style="margin-top:12px;">Back to Platform</a>
    </div>

    <div id="mainContent" class="container" style="display:none;">
        <div class="tabs" role="tablist">
            <button class="tab active" onclick="switchTab('stats')" role="tab" aria-selected="true" aria-controls="panel-stats">Stats</button>
            <button class="tab" onclick="switchTab('users')" role="tab" aria-selected="false" aria-controls="panel-users">Users</button>
            <button class="tab" onclick="switchTab('robots')" role="tab" aria-selected="false" aria-controls="panel-robots">Robots</button>
            <button class="tab" onclick="switchTab('assignments')" role="tab" aria-selected="false" aria-controls="panel-assignments">Assignments</button>
            <button class="tab" onclick="switchTab('waitlist')" role="tab" aria-selected="false" aria-controls="panel-waitlist">Waitlist</button>
            <button class="tab" onclick="switchTab('audit')" role="tab" aria-selected="false" aria-controls="panel-audit">Audit Log</button>
        </div>

        <!-- Stats Panel -->
        <div id="panel-stats" class="panel active" role="tabpanel">
            <div class="stats-grid" id="statsGrid"></div>
        </div>

        <!-- Users Panel -->
        <div id="panel-users" class="panel" role="tabpanel">
            <table class="responsive-table">
                <thead>
                    <tr><th>Email</th><th>Name</th><th>Plan</th><th>Lots</th><th>Jobs</th><th>Joined</th><th>Actions</th></tr>
                </thead>
                <tbody id="usersBody"></tbody>
            </table>
            <div class="pagination" id="usersPagination"></div>
        </div>

        <!-- Waitlist Panel -->
        <div id="panel-waitlist" class="panel" role="tabpanel">
            <div style="margin-bottom:12px;text-align:right;">
                <button class="btn btn-sm" onclick="exportWaitlistCSV()">Export CSV</button>
            </div>
            <table class="responsive-table">
                <thead>
                    <tr><th>Email</th><th>Source</th><th>Date</th><th>Actions</th></tr>
                </thead>
                <tbody id="waitlistBody"></tbody>
            </table>
            <div class="pagination" id="waitlistPagination"></div>
        </div>

        <!-- Robots Panel -->
        <div id="panel-robots" class="panel" role="tabpanel">
            <div style="margin-bottom:12px;text-align:right;">
                <button class="btn btn-sm" onclick="showAddRobotForm()">+ Add Robot</button>
            </div>
            <div id="addRobotForm" style="display:none;margin-bottom:16px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);">
                <div style="display:flex;gap:8px;align-items:end;flex-wrap:wrap;">
                    <label style="font-size:12px;color:var(--text2);">Serial<br><input id="robotSerial" style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px;" placeholder="STR-001"></label>
                    <label style="font-size:12px;color:var(--text2);">HW Version<br><input id="robotHwVersion" value="v1" style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px;width:80px;"></label>
                    <button class="btn" onclick="addRobot()">Create</button>
                    <button class="btn" onclick="document.getElementById('addRobotForm').style.display='none'">Cancel</button>
                </div>
            </div>
            <table class="responsive-table">
                <thead>
                    <tr><th>Serial</th><th>Status</th><th>HW</th><th>Firmware</th><th>API Key</th><th>Last Seen</th><th>Actions</th></tr>
                </thead>
                <tbody id="robotsBody"></tbody>
            </table>
            <div class="pagination" id="robotsPagination"></div>
        </div>

        <!-- Assignments Panel -->
        <div id="panel-assignments" class="panel" role="tabpanel">
            <table class="responsive-table">
                <thead>
                    <tr><th>Robot</th><th>User</th><th>Status</th><th>Tracking</th><th>Shipped</th><th>Actions</th></tr>
                </thead>
                <tbody id="assignmentsBody"></tbody>
            </table>
            <div class="pagination" id="assignmentsPagination"></div>
        </div>

        <!-- Audit Log Panel -->
        <div id="panel-audit" class="panel" role="tabpanel">
            <table class="responsive-table">
                <thead>
                    <tr><th>Admin</th><th>Action</th><th>Target</th><th>Detail</th><th>Date</th></tr>
                </thead>
                <tbody id="auditBody"></tbody>
            </table>
            <div class="pagination" id="auditPagination"></div>
        </div>
    </div>

    <script>
    var API_BASE = window.location.origin + '/api';
    var token = localStorage.getItem('strype_token');
    var PAGE_SIZE = 20;

    function escapeHtml(str) {
        if (str == null) return '';
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(String(str)));
        return div.innerHTML;
    }

    /** Read a cookie value by name. */
    function getCookie(name) {
        var match = document.cookie.match(new RegExp('(?:^|;\\s*)' + name + '=([^;]*)'));
        return match ? decodeURIComponent(match[1]) : null;
    }

    function api(method, path, body) {
        var headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
        // Include CSRF token for state-changing requests
        if (method !== 'GET') {
            var csrf = getCookie('csrf_token');
            if (csrf) headers['X-CSRF-Token'] = csrf;
        }
        var opts = { method: method, headers: headers };
        if (body) opts.body = JSON.stringify(body);
        return fetch(API_BASE + path, opts).then(function(r) {
            if (!r.ok) throw { status: r.status };
            if (r.headers.get('content-type')?.includes('text/csv')) return r.text();
            return r.json();
        });
    }

    /** Show a styled modal dialog. Returns a promise that resolves to true (confirm) or false (cancel). */
    function showModal(title, message, confirmLabel, isDanger) {
        return new Promise(function(resolve) {
            var overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center';
            overlay.innerHTML = '<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:420px;width:90%">' +
                '<h3 style="margin-bottom:8px">' + escapeHtml(title) + '</h3>' +
                '<p style="color:var(--text2);font-size:14px;margin-bottom:20px;white-space:pre-wrap">' + escapeHtml(message) + '</p>' +
                '<div style="display:flex;gap:8px;justify-content:flex-end">' +
                '<button class="btn" id="__modal_cancel">Cancel</button>' +
                '<button class="btn' + (isDanger ? ' btn-danger' : '') + '" id="__modal_confirm" style="' + (isDanger ? '' : 'background:var(--green);color:var(--bg);border-color:var(--green)') + '">' + escapeHtml(confirmLabel) + '</button>' +
                '</div></div>';
            document.body.appendChild(overlay);
            overlay.querySelector('#__modal_cancel').onclick = function() { overlay.remove(); resolve(false); };
            overlay.querySelector('#__modal_confirm').onclick = function() { overlay.remove(); resolve(true); };
        });
    }

    /** Show a modal with copyable text content. */
    function showCopyModal(title, text) {
        var overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center';
        overlay.innerHTML = '<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:500px;width:90%">' +
            '<h3 style="margin-bottom:8px">' + escapeHtml(title) + '</h3>' +
            '<p style="color:var(--text2);font-size:13px;margin-bottom:12px">Copy this key now. It will not be shown again.</p>' +
            '<div style="display:flex;gap:8px;margin-bottom:16px">' +
            '<input id="__copy_input" readonly style="flex:1;background:var(--bg);color:var(--green);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-family:JetBrains Mono,monospace;font-size:13px" value="' + escapeHtml(text) + '">' +
            '<button class="btn" id="__copy_btn" style="white-space:nowrap">Copy</button>' +
            '</div>' +
            '<div style="text-align:right"><button class="btn" id="__copy_close">Close</button></div>' +
            '</div>';
        document.body.appendChild(overlay);
        overlay.querySelector('#__copy_btn').onclick = function() {
            var input = overlay.querySelector('#__copy_input');
            input.select();
            navigator.clipboard.writeText(text).then(function() {
                overlay.querySelector('#__copy_btn').textContent = 'Copied!';
            });
        };
        overlay.querySelector('#__copy_close').onclick = function() { overlay.remove(); };
    }

    /** Show a prompt modal. Returns a promise that resolves to the input value or null. */
    function showPromptModal(title, message, placeholder) {
        return new Promise(function(resolve) {
            var overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center';
            overlay.innerHTML = '<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:420px;width:90%">' +
                '<h3 style="margin-bottom:8px">' + escapeHtml(title) + '</h3>' +
                '<p style="color:var(--text2);font-size:14px;margin-bottom:12px">' + escapeHtml(message) + '</p>' +
                '<input id="__prompt_input" style="width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:14px;margin-bottom:16px" placeholder="' + escapeHtml(placeholder || '') + '">' +
                '<div style="display:flex;gap:8px;justify-content:flex-end">' +
                '<button class="btn" id="__prompt_cancel">Cancel</button>' +
                '<button class="btn" id="__prompt_ok" style="background:var(--green);color:var(--bg);border-color:var(--green)">OK</button>' +
                '</div></div>';
            document.body.appendChild(overlay);
            overlay.querySelector('#__prompt_cancel').onclick = function() { overlay.remove(); resolve(null); };
            overlay.querySelector('#__prompt_ok').onclick = function() { var v = overlay.querySelector('#__prompt_input').value; overlay.remove(); resolve(v); };
            overlay.querySelector('#__prompt_input').addEventListener('keydown', function(e) { if (e.key === 'Enter') overlay.querySelector('#__prompt_ok').click(); });
        });
    }

    function switchTab(name) {
        document.querySelectorAll('.tab').forEach(function(t, i) {
            var isActive = ['stats','users','robots','assignments','waitlist','audit'][i] === name;
            t.classList.toggle('active', isActive);
            t.setAttribute('aria-selected', isActive ? 'true' : 'false');
        });
        document.querySelectorAll('.panel').forEach(function(p) {
            p.classList.toggle('active', p.id === 'panel-' + name);
        });
        if (name === 'stats') loadStats();
        if (name === 'users') loadUsers(1);
        if (name === 'robots') loadRobots(1);
        if (name === 'assignments') loadAssignments(1);
        if (name === 'waitlist') loadWaitlist(1);
        if (name === 'audit') loadAudit(1);
    }

    function loadStats() {
        api('GET', '/admin/stats').then(function(data) {
            var grid = document.getElementById('statsGrid');
            var proCount = data.users_by_plan.pro || 0;
            var robotCount = data.users_by_plan.robot || 0;
            var mrr = proCount * 99 + robotCount * 299;
            grid.innerHTML = [
                card(data.users, 'Total Users'),
                card(data.lots, 'Total Lots'),
                card(data.jobs, 'Total Jobs'),
                card(data.waitlist, 'Waitlist'),
                card(data.users_by_plan.free || 0, 'Free Users'),
                card(proCount, 'Pro Users'),
                card(robotCount, 'Robot Users'),
                card(data.users_by_plan.enterprise || 0, 'Enterprise'),
                card(data.robot_count || 0, 'Total Robots'),
                card(data.robots_available || 0, 'Available'),
                card(data.active_assignments || 0, 'Active Assignments'),
                card('$' + mrr, 'Est. MRR'),
            ].join('');
        });
    }

    function card(value, label) {
        return '<div class="stat-card"><div class="value">' + value + '</div><div class="label">' + label + '</div></div>';
    }

    function loadUsers(page) {
        api('GET', '/admin/users?page=' + page + '&limit=' + PAGE_SIZE).then(function(data) {
            var tbody = document.getElementById('usersBody');
            if (!data.items.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty">No users</td></tr>'; return; }
            tbody.innerHTML = data.items.map(function(u) {
                var planBadge = '<span class="badge badge-' + u.plan + '">' + u.plan + '</span>';
                if (u.is_admin) planBadge += ' <span class="badge badge-admin">admin</span>';
                var date = new Date(u.created_at).toLocaleDateString();
                return '<tr>' +
                    '<td data-label="Email">' + escapeHtml(u.email) + '</td>' +
                    '<td data-label="Name">' + escapeHtml(u.name || '-') + '</td>' +
                    '<td data-label="Plan">' + planBadge + '</td>' +
                    '<td data-label="Lots">' + u.lot_count + '</td>' +
                    '<td data-label="Jobs">' + u.job_count + '</td>' +
                    '<td data-label="Joined">' + date + '</td>' +
                    '<td data-label="Actions" class="actions">' +
                        '<select onchange="changePlan(\'' + u.id + '\', this.value)">' +
                            '<option value="free"' + (u.plan==='free'?' selected':'') + '>Free</option>' +
                            '<option value="pro"' + (u.plan==='pro'?' selected':'') + '>Pro</option>' +
                            '<option value="robot"' + (u.plan==='robot'?' selected':'') + '>Robot</option>' +
                            '<option value="enterprise"' + (u.plan==='enterprise'?' selected':'') + '>Enterprise</option>' +
                        '</select>' +
                        (u.is_admin ? '' : ' <button class="btn btn-sm btn-danger" onclick="deleteUser(\'' + u.id + '\', \'' + escapeHtml(u.email).replace(/'/g, "\\'") + '\')">Delete</button>') +
                    '</td></tr>';
            }).join('');
            renderPagination('usersPagination', data, loadUsers);
        });
    }

    function loadWaitlist(page) {
        api('GET', '/admin/waitlist?page=' + page + '&limit=' + PAGE_SIZE).then(function(data) {
            var tbody = document.getElementById('waitlistBody');
            if (!data.items.length) { tbody.innerHTML = '<tr><td colspan="4" class="empty">No entries</td></tr>'; return; }
            tbody.innerHTML = data.items.map(function(w) {
                var date = new Date(w.created_at).toLocaleDateString();
                return '<tr><td data-label="Email">' + escapeHtml(w.email) + '</td><td data-label="Source">' + escapeHtml(w.source) + '</td><td data-label="Date">' + date + '</td><td data-label="Actions"><button class="btn btn-sm btn-danger" onclick="deleteWaitlistEntry(' + w.id + ')">Delete</button></td></tr>';
            }).join('');
            renderPagination('waitlistPagination', data, loadWaitlist);
        });
    }

    function renderPagination(id, data, loadFn) {
        var totalPages = Math.ceil(data.total / data.limit);
        if (totalPages <= 1) { document.getElementById(id).innerHTML = ''; return; }
        var html = '';
        for (var i = 1; i <= totalPages; i++) {
            html += '<button class="btn btn-sm' + (i === data.page ? ' active' : '') + '" onclick="(' + loadFn.name + ')(' + i + ')">' + i + '</button>';
        }
        document.getElementById(id).innerHTML = html;
    }

    function changePlan(userId, plan) {
        api('PUT', '/admin/users/' + userId + '/plan', { plan: plan }).then(function() {
            loadUsers(1);
        });
    }

    function loadAudit(page) {
        api('GET', '/admin/audit-log?page=' + page + '&limit=' + PAGE_SIZE).then(function(data) {
            var tbody = document.getElementById('auditBody');
            if (!data.items.length) { tbody.innerHTML = '<tr><td colspan="5" class="empty">No audit entries</td></tr>'; return; }
            tbody.innerHTML = data.items.map(function(a) {
                var date = new Date(a.created_at).toLocaleString();
                return '<tr><td data-label="Admin">' + escapeHtml(a.admin_email) + '</td><td data-label="Action">' + escapeHtml(a.action) + '</td><td data-label="Target">' + escapeHtml(a.target || '-') + '</td><td data-label="Detail">' + escapeHtml(a.detail || '-') + '</td><td data-label="Date">' + date + '</td></tr>';
            }).join('');
            renderPagination('auditPagination', data, loadAudit);
        });
    }

    function deleteUser(userId, email) {
        showModal('Delete User', 'Delete user ' + email + '? This cannot be undone.', 'Delete', true).then(function(ok) {
            if (!ok) return;
            api('DELETE', '/admin/users/' + userId).then(function() {
                loadUsers(1);
                loadStats();
            });
        });
    }

    function deleteWaitlistEntry(entryId) {
        showModal('Remove Entry', 'Remove this waitlist entry?', 'Remove', true).then(function(ok) {
            if (!ok) return;
            api('DELETE', '/admin/waitlist/' + entryId).then(function() {
                loadWaitlist(1);
                loadStats();
            });
        });
    }

    function exportWaitlistCSV() {
        fetch(API_BASE + '/admin/waitlist?format=csv&limit=10000', {
            headers: { 'Authorization': 'Bearer ' + token },
        }).then(function(r) { return r.blob(); }).then(function(blob) {
            var a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'waitlist.csv';
            a.click();
        });
    }

    // --- Robot Fleet Management ---
    function showAddRobotForm() {
        document.getElementById('addRobotForm').style.display = 'block';
    }

    function addRobot() {
        var serial = document.getElementById('robotSerial').value.trim();
        var hwVersion = document.getElementById('robotHwVersion').value.trim() || 'v1';
        if (!serial) return;
        api('POST', '/admin/robots', { serial_number: serial, hardware_version: hwVersion }).then(function() {
            document.getElementById('addRobotForm').style.display = 'none';
            document.getElementById('robotSerial').value = '';
            loadRobots(1);
        }).catch(function() { showModal('Error', 'Failed to create robot.', 'OK', false); });
    }

    function loadRobots(page) {
        api('GET', '/admin/robots?page=' + page + '&limit=' + PAGE_SIZE).then(function(data) {
            var tbody = document.getElementById('robotsBody');
            if (!data.items.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty">No robots</td></tr>'; return; }
            tbody.innerHTML = data.items.map(function(r) {
                var statusClass = r.status === 'available' ? 'badge-pro' : r.status === 'retired' ? 'badge-free' : 'badge-admin';
                var lastSeen = r.last_seen_at ? new Date(r.last_seen_at).toLocaleString() : 'Never';
                return '<tr>' +
                    '<td data-label="Serial">' + escapeHtml(r.serial_number) + '</td>' +
                    '<td data-label="Status"><span class="badge ' + statusClass + '">' + r.status + '</span></td>' +
                    '<td data-label="HW">' + escapeHtml(r.hardware_version || '') + '</td>' +
                    '<td data-label="Firmware">' + escapeHtml(r.firmware_version || '-') + '</td>' +
                    '<td data-label="API Key">' + (r.has_api_key ? '****' + escapeHtml(r.api_key_last4 || '') + ' <button class="btn btn-sm" onclick="generateApiKey(\'' + r.id + '\')">Rotate</button> <button class="btn btn-sm btn-danger" onclick="revokeApiKey(\'' + r.id + '\')">Revoke</button>' : '<button class="btn btn-sm" onclick="generateApiKey(\'' + r.id + '\')">Generate</button>') + '</td>' +
                    '<td data-label="Last Seen">' + lastSeen + '</td>' +
                    '<td data-label="Actions" class="actions">' +
                        '<select onchange="updateRobotStatus(\'' + r.id + '\', this.value)">' +
                            '<option value="">Change...</option>' +
                            '<option value="available">Available</option>' +
                            '<option value="maintenance">Maintenance</option>' +
                            '<option value="retired">Retired</option>' +
                        '</select> ' +
                        (r.status === 'available' ? '<button class="btn btn-sm" onclick="showAssignModal(\'' + r.id + '\')">Assign</button>' : '') +
                    '</td></tr>';
            }).join('');
            renderPagination('robotsPagination', data, loadRobots);
        });
    }

    function updateRobotStatus(robotId, status) {
        if (!status) return;
        api('PUT', '/admin/robots/' + robotId, { status: status }).then(function() {
            loadRobots(1);
        });
    }

    function generateApiKey(robotId) {
        api('POST', '/admin/robots/' + robotId + '/api-key').then(function(data) {
            showCopyModal('Robot API Key', data.api_key);
            loadRobots(1);
        }).catch(function(e) {
            showModal('Error', 'Failed to generate key.', 'OK', false);
        });
    }

    function revokeApiKey(robotId) {
        showModal('Revoke API Key', 'Revoke this API key? The robot will stop sending telemetry until a new key is generated.', 'Revoke', true).then(function(ok) {
            if (!ok) return;
            api('DELETE', '/admin/robots/' + robotId + '/api-key').then(function() {
                loadRobots(1);
            }).catch(function() {
                showModal('Error', 'Failed to revoke key.', 'OK', false);
            });
        });
    }

    function showAssignModal(robotId) {
        // Fetch users to populate dropdown
        api('GET', '/admin/users?limit=200').then(function(data) {
            var options = data.items.map(function(u) {
                return '<option value="' + u.id + '">' + escapeHtml(u.email) + ' (' + u.plan + ')</option>';
            }).join('');
            var html = '<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center" id="assignModal">' +
                '<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:400px;width:90%">' +
                '<h3 style="margin-bottom:12px">Assign Robot</h3>' +
                '<select id="assignUserId" style="width:100%;margin-bottom:12px">' + options + '</select>' +
                '<div style="display:flex;gap:8px;justify-content:flex-end">' +
                '<button class="btn" onclick="document.getElementById(\'assignModal\').remove()">Cancel</button>' +
                '<button class="btn" style="background:var(--green);color:var(--bg);border-color:var(--green)" onclick="confirmAssign(\'' + robotId + '\')">Assign</button>' +
                '</div></div></div>';
            document.body.insertAdjacentHTML('beforeend', html);
        });
    }

    function confirmAssign(robotId) {
        var userId = document.getElementById('assignUserId').value;
        api('POST', '/admin/robots/assign', { robot_id: robotId, user_id: userId }).then(function() {
            var modal = document.getElementById('assignModal');
            if (modal) modal.remove();
            loadRobots(1);
            loadAssignments(1);
        }).catch(function() { showModal('Error', 'Assignment failed.', 'OK', false); });
    }

    function loadAssignments(page) {
        api('GET', '/admin/assignments?page=' + page + '&limit=' + PAGE_SIZE).then(function(data) {
            var tbody = document.getElementById('assignmentsBody');
            if (!data.items.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">No assignments</td></tr>'; return; }
            tbody.innerHTML = data.items.map(function(a) {
                var shipped = a.shipped_at ? new Date(a.shipped_at).toLocaleDateString() : '-';
                return '<tr>' +
                    '<td data-label="Robot">' + escapeHtml(a.serial_number || a.robot_id) + '</td>' +
                    '<td data-label="User">' + escapeHtml(a.user_email || a.user_id) + '</td>' +
                    '<td data-label="Status"><span class="badge badge-admin">' + a.status + '</span></td>' +
                    '<td data-label="Tracking">' + escapeHtml(a.tracking_number || '-') + '</td>' +
                    '<td data-label="Shipped">' + shipped + '</td>' +
                    '<td data-label="Actions" class="actions">' +
                        '<select onchange="updateAssignment(\'' + a.id + '\', this.value)">' +
                            '<option value="">Update...</option>' +
                            '<option value="shipped">Mark Shipped</option>' +
                            '<option value="active">Mark Delivered</option>' +
                            '<option value="returning">Initiate Return</option>' +
                            '<option value="returned">Mark Returned</option>' +
                        '</select>' +
                    '</td></tr>';
            }).join('');
            renderPagination('assignmentsPagination', data, loadAssignments);
        });
    }

    function updateAssignment(assignmentId, status) {
        if (!status) return;
        var body = { status: status };
        if (status === 'shipped') {
            showPromptModal('Tracking Number', 'Enter the tracking number for this shipment:', 'e.g. 1Z999AA10123456784').then(function(tracking) {
                if (tracking) body.tracking_number = tracking;
                api('PUT', '/admin/robots/assignments/' + assignmentId, body).then(function() {
                    loadAssignments(1);
                    loadRobots(1);
                });
            });
        } else {
            api('PUT', '/admin/robots/assignments/' + assignmentId, body).then(function() {
                loadAssignments(1);
                loadRobots(1);
            });
        }
    }

    // Init: check auth
    if (!token) {
        document.getElementById('authGate').style.display = 'flex';
    } else {
        api('GET', '/auth/me').then(function(user) {
            document.getElementById('userEmail').textContent = user.email;
            // Check admin via admin stats endpoint
            return api('GET', '/admin/stats');
        }).then(function() {
            document.getElementById('mainContent').style.display = 'block';
            loadStats();
        }).catch(function(e) {
            document.getElementById('authGate').style.display = 'flex';
        });
    }
    </script>
</body>
</html>
