<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Striper Robot Dashboard</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">

    <!-- Leaflet Draw CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css">

    <!-- App CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header id="header">
            <div class="brand">
                <div class="logo">S</div>
                <span>STRIPER</span>
            </div>
            <div id="connection-status">
                <span class="dot" id="ws-dot"></span>
                <span id="ws-label">Disconnected</span>
            </div>
        </header>

        <!-- Sidebar -->
        <aside id="sidebar">
            <nav>
                <div class="nav-item active" data-view="map">
                    <span class="icon">&#9678;</span>
                    <span>Map</span>
                </div>
                <div class="nav-item" data-view="jobs">
                    <span class="icon">&#9776;</span>
                    <span>Jobs</span>
                </div>
                <div class="nav-item" data-view="status">
                    <span class="icon">&#9881;</span>
                    <span>Robot Status</span>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div>Striper v0.1.0</div>
                <div class="mock-badge" id="mode-badge">MOCK MODE</div>
            </div>
        </aside>

        <!-- Main Content -->
        <main id="main">
            <!-- Map View -->
            <section class="view active" id="view-map">
                <div id="map-container">
                    <div id="map"></div>
                    <div class="map-toolbar">
                        <button onclick="MapEditor.placeTemplate()">+ Place Template</button>
                        <button onclick="MapEditor.clearPaths()">Clear Paths</button>
                        <button onclick="MapEditor.centerOnRobot()">Center on Robot</button>
                    </div>
                </div>
            </section>

            <!-- Jobs View -->
            <section class="view" id="view-jobs">
                <div class="view-header">
                    <h2>Striping Jobs</h2>
                    <button class="btn btn-primary" onclick="JobManager.showCreateModal()">+ New Job</button>
                </div>
                <div id="job-list"></div>
            </section>

            <!-- Status View -->
            <section class="view" id="view-status">
                <div class="view-header">
                    <h2>Robot Status</h2>
                </div>
                <div class="status-grid">
                    <div class="stat-card">
                        <div class="label">State</div>
                        <div class="value" id="stat-state">--</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Speed</div>
                        <div class="value"><span id="stat-speed">0.0</span><span class="unit">m/s</span></div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Heading</div>
                        <div class="value"><span id="stat-heading">0</span><span class="unit">&deg;</span></div>
                    </div>
                    <div class="stat-card">
                        <div class="label">GPS Accuracy</div>
                        <div class="value"><span id="stat-gps">--</span><span class="unit">m</span></div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Battery</div>
                        <div class="value" id="stat-battery">--<span class="unit">%</span></div>
                        <div class="progress-bar"><div class="fill" id="bar-battery" style="width: 0%"></div></div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Paint Level</div>
                        <div class="value" id="stat-paint">--<span class="unit">%</span></div>
                        <div class="progress-bar"><div class="fill" id="bar-paint" style="width: 0%"></div></div>
                    </div>
                </div>

                <div class="card" style="text-align:center;">
                    <h3 style="margin-bottom:8px;">Job Progress</h3>
                    <div class="value" style="font-size:36px;font-family:var(--font-mono);" id="stat-progress">0%</div>
                    <div class="progress-bar" style="margin-top:12px;height:14px;">
                        <div class="fill" id="bar-progress" style="width: 0%"></div>
                    </div>
                </div>

                <button class="estop-btn" id="estop-btn" onclick="RobotMonitor.toggleEstop()">
                    E-STOP
                </button>
            </section>
        </main>
    </div>

    <!-- Create Job Modal -->
    <div class="modal-overlay" id="modal-create-job">
        <div class="modal">
            <h3>Create New Job</h3>
            <div class="form-group">
                <label>Job Name</label>
                <input type="text" id="input-job-name" placeholder="e.g. Lot A — Row 1">
            </div>
            <div class="form-group">
                <label>Template</label>
                <select id="input-job-template" onchange="JobManager.onTemplateChange()">
                    <option value="">None (upload DXF/SVG)</option>
                    <optgroup label="Parking">
                        <option value="standard">Standard (90&deg;)</option>
                        <option value="angled_60">60&deg; Angled</option>
                        <option value="angled_45">45&deg; Angled</option>
                        <option value="handicap">Handicap</option>
                        <option value="compact">Compact</option>
                    </optgroup>
                    <optgroup label="Markings">
                        <option value="arrow">Directional Arrow</option>
                        <option value="crosswalk">Crosswalk</option>
                    </optgroup>
                </select>
            </div>
            <div class="form-group parking-param" id="template-params" style="display:none;">
                <label>Number of Stalls</label>
                <input type="number" id="input-stall-count" value="10" min="1" max="100">
            </div>
            <div class="form-group arrow-param" style="display:none;">
                <label>Arrow Type</label>
                <select id="input-arrow-type">
                    <option value="straight">Straight</option>
                    <option value="left">Left Turn</option>
                    <option value="right">Right Turn</option>
                    <option value="u_turn">U-Turn</option>
                </select>
            </div>
            <div class="form-group crosswalk-param" style="display:none;">
                <label>Crosswalk Width (ft)</label>
                <input type="number" id="input-crosswalk-width" value="10" min="4" max="30" step="0.5">
            </div>
            <div class="form-group crosswalk-param" style="display:none;">
                <label>Crosswalk Length (ft)</label>
                <input type="number" id="input-crosswalk-length" value="20" min="6" max="60" step="0.5">
            </div>
            <div class="form-group" id="file-upload-group">
                <label>Upload Path File (DXF / SVG)</label>
                <input type="file" id="input-path-file" accept=".dxf,.svg">
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="JobManager.closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="JobManager.createJob()">Create</button>
            </div>
        </div>
    </div>

    <!-- Template Placement Modal -->
    <div class="modal-overlay" id="modal-place-template">
        <div class="modal">
            <h3>Place Template on Map</h3>
            <div class="form-group">
                <label>Template Type</label>
                <select id="tpl-type" onchange="MapEditor.onTplTypeChange()">
                    <optgroup label="Parking">
                        <option value="standard">Standard (90&deg;)</option>
                        <option value="angled_60">60&deg; Angled</option>
                        <option value="angled_45">45&deg; Angled</option>
                        <option value="handicap">Handicap</option>
                        <option value="compact">Compact</option>
                    </optgroup>
                    <optgroup label="Markings">
                        <option value="arrow">Directional Arrow</option>
                        <option value="crosswalk">Crosswalk</option>
                    </optgroup>
                </select>
            </div>
            <div class="form-group tpl-parking-param">
                <label>Number of Stalls</label>
                <input type="number" id="tpl-count" value="10" min="1" max="100">
            </div>
            <div class="form-group tpl-arrow-param" style="display:none;">
                <label>Arrow Type</label>
                <select id="tpl-arrow-type">
                    <option value="straight">Straight</option>
                    <option value="left">Left Turn</option>
                    <option value="right">Right Turn</option>
                    <option value="u_turn">U-Turn</option>
                </select>
            </div>
            <div class="form-group tpl-crosswalk-param" style="display:none;">
                <label>Width (ft)</label>
                <input type="number" id="tpl-crosswalk-width" value="10" min="4" max="30" step="0.5">
            </div>
            <div class="form-group tpl-crosswalk-param" style="display:none;">
                <label>Length (ft)</label>
                <input type="number" id="tpl-crosswalk-length" value="20" min="6" max="60" step="0.5">
            </div>
            <div class="form-group">
                <label>Rotation (degrees)</label>
                <input type="number" id="tpl-angle" value="0" step="5">
            </div>
            <p style="font-size:12px;color:var(--text-secondary);margin-top:8px;">Click the map to place the template at that location.</p>
            <div class="modal-actions">
                <button class="btn" onclick="MapEditor.cancelPlacement()">Cancel</button>
                <button class="btn btn-primary" onclick="MapEditor.startPlacement()">Place on Map</button>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <!-- Libraries -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

    <!-- App scripts -->
    <script src="js/app.js"></script>
    <script src="js/map_editor.js"></script>
    <script src="js/robot_monitor.js"></script>
    <script src="js/job_manager.js"></script>
</body>
</html>
