name: Deploy AWS

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=${{ secrets.ECR_REPOSITORY_URL }}:${IMAGE_TAG}
          docker build -t $IMAGE_URI -f backend/Dockerfile .
          docker push $IMAGE_URI
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform apply
        working-directory: infra/terraform
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="image_url=${IMAGE_URI}" \
            -var="certificate_arn=${{ secrets.AWS_CERTIFICATE_ARN }}" \
            -var="database_username=${{ secrets.DB_USERNAME }}" \
            -var="database_password=${{ secrets.DB_PASSWORD }}" \
            -var="database_url_secret_arn=${{ secrets.DATABASE_URL_SECRET_ARN }}" \
            -var="secret_key_secret_arn=${{ secrets.SECRET_KEY_SECRET_ARN }}" \
            -var="stripe_secret_key_secret_arn=${{ secrets.STRIPE_SECRET_KEY_SECRET_ARN }}" \
            -var="stripe_webhook_secret_arn=${{ secrets.STRIPE_WEBHOOK_SECRET_ARN }}" \
            -var="sendgrid_api_key_secret_arn=${{ secrets.SENDGRID_API_KEY_SECRET_ARN }}" \
            -var="sentry_dsn_secret_arn=${{ secrets.SENTRY_DSN_SECRET_ARN }}" \
            -var="frontend_url=${{ secrets.FRONTEND_URL }}" \
            -var="cors_origins=${{ secrets.CORS_ORIGINS }}"
