name: Deploy AWS

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  TF_IN_AUTOMATION: "1"
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'strype' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform format and validate
        working-directory: infra/terraform
        run: |
          terraform fmt -check
          terraform init -backend=false
          terraform validate

  build_image:
    needs: validate
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4
      - id: preflight
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ secrets.AWS_DEPLOY_ROLE_ARN }}" ]; then
            echo "auth_mode=role" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ] && [ -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "auth_mode=keys" >> "$GITHUB_OUTPUT"
          else
            echo "Missing AWS deploy credentials"
            exit 1
          fi
      - name: Configure AWS credentials (OIDC role)
        if: steps.preflight.outputs.auth_mode == 'role'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Configure AWS credentials (access keys)
        if: steps.preflight.outputs.auth_mode == 'keys'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform init (staging)
        working-directory: infra/terraform
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}
        run: |
          set -euo pipefail
          BACKEND_ARGS=(
            "-backend-config=bucket=${TF_STATE_BUCKET}"
            "-backend-config=key=${PROJECT_NAME}/staging/terraform.tfstate"
            "-backend-config=region=${AWS_REGION}"
            "-backend-config=encrypt=true"
          )
          if [ -n "${TF_STATE_LOCK_TABLE}" ]; then
            BACKEND_ARGS+=("-backend-config=dynamodb_table=${TF_STATE_LOCK_TABLE}")
          fi
          terraform init -reconfigure "${BACKEND_ARGS[@]}"
      - name: Bootstrap staging ECR repository
        working-directory: infra/terraform
        env:
          TF_VAR_database_username: ${{ secrets.DB_USERNAME }}
          TF_VAR_database_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_database_url_secret_arn: ${{ secrets.DATABASE_URL_SECRET_ARN }}
          TF_VAR_secret_key_secret_arn: ${{ secrets.SECRET_KEY_SECRET_ARN }}
          TF_VAR_stripe_secret_key_secret_arn: ${{ secrets.STRIPE_SECRET_KEY_SECRET_ARN }}
          TF_VAR_stripe_webhook_secret_arn: ${{ secrets.STRIPE_WEBHOOK_SECRET_ARN }}
          TF_VAR_sendgrid_api_key_secret_arn: ${{ secrets.SENDGRID_API_KEY_SECRET_ARN }}
          TF_VAR_sentry_dsn_secret_arn: ${{ secrets.SENTRY_DSN_SECRET_ARN }}
          TF_VAR_frontend_url: ${{ secrets.FRONTEND_URL }}
          TF_VAR_cors_origins: ${{ secrets.CORS_ORIGINS }}
          TF_VAR_certificate_arn: ${{ secrets.AWS_CERTIFICATE_ARN }}
          TF_VAR_alarm_topic_arn: ${{ secrets.ALARM_TOPIC_ARN }}
          TF_VAR_image_url: public.ecr.aws/docker/library/python:3.12-slim
        run: |
          terraform apply -auto-approve -target=aws_ecr_repository.app \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="environment=staging"
      - id: ecr
        name: Resolve ECR repository URL
        working-directory: infra/terraform
        run: |
          echo "repo_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
      - uses: aws-actions/amazon-ecr-login@v2
      - id: build
        name: Build and push image
        run: |
          IMAGE_URI=${{ steps.ecr.outputs.repo_url }}:${{ github.sha }}
          docker build -t "$IMAGE_URI" -f backend/Dockerfile .
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

  deploy_staging:
    needs: build_image
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      ready_url: ${{ steps.outputs.outputs.ready_url }}
    steps:
      - uses: actions/checkout@v4
      - id: preflight
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ secrets.AWS_DEPLOY_ROLE_ARN }}" ]; then
            echo "auth_mode=role" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ] && [ -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "auth_mode=keys" >> "$GITHUB_OUTPUT"
          else
            echo "Missing AWS deploy credentials"
            exit 1
          fi
      - name: Configure AWS credentials (OIDC role)
        if: steps.preflight.outputs.auth_mode == 'role'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Configure AWS credentials (access keys)
        if: steps.preflight.outputs.auth_mode == 'keys'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform init (staging)
        working-directory: infra/terraform
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}
        run: |
          set -euo pipefail
          BACKEND_ARGS=(
            "-backend-config=bucket=${TF_STATE_BUCKET}"
            "-backend-config=key=${PROJECT_NAME}/staging/terraform.tfstate"
            "-backend-config=region=${AWS_REGION}"
            "-backend-config=encrypt=true"
          )
          if [ -n "${TF_STATE_LOCK_TABLE}" ]; then
            BACKEND_ARGS+=("-backend-config=dynamodb_table=${TF_STATE_LOCK_TABLE}")
          fi
          terraform init -reconfigure "${BACKEND_ARGS[@]}"
      - name: Terraform plan (staging)
        working-directory: infra/terraform
        env:
          TF_VAR_database_username: ${{ secrets.DB_USERNAME }}
          TF_VAR_database_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_database_url_secret_arn: ${{ secrets.DATABASE_URL_SECRET_ARN }}
          TF_VAR_secret_key_secret_arn: ${{ secrets.SECRET_KEY_SECRET_ARN }}
          TF_VAR_stripe_secret_key_secret_arn: ${{ secrets.STRIPE_SECRET_KEY_SECRET_ARN }}
          TF_VAR_stripe_webhook_secret_arn: ${{ secrets.STRIPE_WEBHOOK_SECRET_ARN }}
          TF_VAR_sendgrid_api_key_secret_arn: ${{ secrets.SENDGRID_API_KEY_SECRET_ARN }}
          TF_VAR_sentry_dsn_secret_arn: ${{ secrets.SENTRY_DSN_SECRET_ARN }}
          TF_VAR_frontend_url: ${{ secrets.FRONTEND_URL }}
          TF_VAR_cors_origins: ${{ secrets.CORS_ORIGINS }}
          TF_VAR_certificate_arn: ${{ secrets.AWS_CERTIFICATE_ARN }}
          TF_VAR_alarm_topic_arn: ${{ secrets.ALARM_TOPIC_ARN }}
          TF_VAR_image_url: ${{ needs.build_image.outputs.image_uri }}
        run: |
          terraform plan -out=tfplan \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="environment=staging"
      - name: Terraform apply (staging)
        working-directory: infra/terraform
        run: terraform apply -auto-approve tfplan
      - id: outputs
        name: Resolve staging endpoint
        working-directory: infra/terraform
        shell: bash
        env:
          CERT_ARN: ${{ secrets.AWS_CERTIFICATE_ARN }}
        run: |
          ALB_DNS=$(terraform output -raw alb_dns_name)
          if [ -n "$CERT_ARN" ]; then
            echo "ready_url=https://${ALB_DNS}/api/ready" >> "$GITHUB_OUTPUT"
          else
            echo "ready_url=http://${ALB_DNS}/api/ready" >> "$GITHUB_OUTPUT"
          fi

  smoke_staging:
    needs: deploy_staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Wait for readiness and run smoke checks
        env:
          SMOKE_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
          SMOKE_EMAIL: ${{ secrets.SMOKE_EMAIL }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
          SMOKE_ORG_ID: ${{ secrets.SMOKE_ORG_ID }}
        run: |
          python scripts/smoke_check.py

  deploy_production:
    needs: [build_image, smoke_staging]
    runs-on: ubuntu-latest
    environment: production
    outputs:
      ready_url: ${{ steps.outputs.outputs.ready_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Enforce migration rehearsal
        shell: bash
        run: |
          if [ "${{ vars.MIGRATION_REHEARSED }}" != "true" ]; then
            echo "Production deploy blocked until MIGRATION_REHEARSED=true"
            exit 1
          fi
      - id: preflight
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ secrets.AWS_DEPLOY_ROLE_ARN }}" ]; then
            echo "auth_mode=role" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ] && [ -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "auth_mode=keys" >> "$GITHUB_OUTPUT"
          else
            echo "Missing AWS deploy credentials"
            exit 1
          fi
      - name: Configure AWS credentials (OIDC role)
        if: steps.preflight.outputs.auth_mode == 'role'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Configure AWS credentials (access keys)
        if: steps.preflight.outputs.auth_mode == 'keys'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform init (production)
        working-directory: infra/terraform
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}
        run: |
          set -euo pipefail
          BACKEND_ARGS=(
            "-backend-config=bucket=${TF_STATE_BUCKET}"
            "-backend-config=key=${PROJECT_NAME}/production/terraform.tfstate"
            "-backend-config=region=${AWS_REGION}"
            "-backend-config=encrypt=true"
          )
          if [ -n "${TF_STATE_LOCK_TABLE}" ]; then
            BACKEND_ARGS+=("-backend-config=dynamodb_table=${TF_STATE_LOCK_TABLE}")
          fi
          terraform init -reconfigure "${BACKEND_ARGS[@]}"
      - name: Terraform plan (production)
        working-directory: infra/terraform
        env:
          TF_VAR_database_username: ${{ secrets.DB_USERNAME }}
          TF_VAR_database_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_database_url_secret_arn: ${{ secrets.DATABASE_URL_SECRET_ARN }}
          TF_VAR_secret_key_secret_arn: ${{ secrets.SECRET_KEY_SECRET_ARN }}
          TF_VAR_stripe_secret_key_secret_arn: ${{ secrets.STRIPE_SECRET_KEY_SECRET_ARN }}
          TF_VAR_stripe_webhook_secret_arn: ${{ secrets.STRIPE_WEBHOOK_SECRET_ARN }}
          TF_VAR_sendgrid_api_key_secret_arn: ${{ secrets.SENDGRID_API_KEY_SECRET_ARN }}
          TF_VAR_sentry_dsn_secret_arn: ${{ secrets.SENTRY_DSN_SECRET_ARN }}
          TF_VAR_frontend_url: ${{ secrets.FRONTEND_URL }}
          TF_VAR_cors_origins: ${{ secrets.CORS_ORIGINS }}
          TF_VAR_certificate_arn: ${{ secrets.AWS_CERTIFICATE_ARN }}
          TF_VAR_alarm_topic_arn: ${{ secrets.ALARM_TOPIC_ARN }}
          TF_VAR_image_url: ${{ needs.build_image.outputs.image_uri }}
        run: |
          terraform plan -out=tfplan \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="environment=production"
      - name: Terraform apply (production)
        working-directory: infra/terraform
        run: terraform apply -auto-approve tfplan
      - id: outputs
        name: Resolve production endpoint
        working-directory: infra/terraform
        shell: bash
        env:
          CERT_ARN: ${{ secrets.AWS_CERTIFICATE_ARN }}
        run: |
          ALB_DNS=$(terraform output -raw alb_dns_name)
          if [ -n "$CERT_ARN" ]; then
            echo "ready_url=https://${ALB_DNS}/api/ready" >> "$GITHUB_OUTPUT"
          else
            echo "ready_url=http://${ALB_DNS}/api/ready" >> "$GITHUB_OUTPUT"
          fi

  smoke_production:
    needs: deploy_production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Run production smoke checks
        env:
          SMOKE_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
          SMOKE_EMAIL: ${{ secrets.SMOKE_EMAIL }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
          SMOKE_ORG_ID: ${{ secrets.SMOKE_ORG_ID }}
        run: |
          python scripts/smoke_check.py
