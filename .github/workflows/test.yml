name: Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r backend/requirements.txt
      - run: pip install -e striper_pathgen/
      - run: pip install pytest pytest-asyncio pytest-cov httpx
      - name: Backend tests with coverage
        run: python -m pytest backend/tests/ -v --tb=short --cov=backend --cov-report=term-missing --cov-report=xml --cov-fail-under=75
      - name: Pathgen tests
        run: python -m pytest striper_pathgen/tests/ -v --tb=short
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  e2e:
    runs-on: ubuntu-latest
    # Only run E2E on pushes to main/master (saves PR pipeline time)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: pip install -r backend/requirements.txt
      - run: pip install -e striper_pathgen/
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Run Playwright E2E tests
        run: npx playwright test
        env:
          CI: 'true'
          PLAYWRIGHT_PORT: '8111'
          ENV: 'test'
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
